include "application"

db.default.driver = org.h2.Driver
db.default.url = "jdbc:h2:./target/deposplit-dev;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE"
# db.default.driver = org.postgresql.Driver
# db.default.url = "postgresql://PSuser:PSpassword@localhost:5432/PSuser"

# Allow localhost:9000 in addition to the production hosts already in application.conf.
# Required for iOS Simulator, which reaches the host machine via localhost rather than 10.0.2.2.
play.filters.hosts.allowed = [".deposplit.com", "localhost", "localhost:9000", "127.0.0.1", "10.0.2.2:9000", ${?PAAS_DOMAIN}]
